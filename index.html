<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dxio's electric webs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════
       LANDING SCREEN
  ═══════════════════════════════════ -->
  <div id="screen-landing" class="screen active">

    <canvas id="bg-canvas"></canvas>

    <div class="noise-layer"></div>

    <div class="vignette"></div>

    <div class="landing-content">

      <div class="pre-label">dxio presents</div>

      <div class="title-block">
        <h1 class="t-outline">ELECTRIC</h1>
        <h1 class="t-filled">WEBS</h1>
        <div class="title-rule">
          <span></span><span></span><span></span>
        </div>
      </div>

      <p class="tagline">show your hands — feel the current</p>

      <button id="start-btn">
        <span class="btn-label">START</span>
        <div class="btn-border-top"></div>
        <div class="btn-border-bot"></div>
        <div class="btn-ring r1"></div>
        <div class="btn-ring r2"></div>
        <div class="btn-ring r3"></div>
      </button>

      <div class="version-tag">v1.0.0 &nbsp;·&nbsp; hand tracker</div>

    </div><!-- /landing-content -->

    <!-- bottom-left GitHub -->
    <a href="https://github.com/0iiyxsxx" target="_blank" rel="noopener noreferrer" class="github-link" id="github-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57
          0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695
          -.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99
          .105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225
          -.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405
          c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225
          0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3
          0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      <span>github/0iiyxsxx</span>
    </a>

  </div><!-- /screen-landing -->


  <!-- ═══════════════════════════════════
       CAMERA SCREEN
  ═══════════════════════════════════ -->
  <div id="screen-camera" class="screen">

    <video id="video" playsinline autoplay muted></video>
    <canvas id="overlay"></canvas>

    <!-- scan-line effect -->
    <div class="scan-line"></div>

    <!-- corner brackets -->
    <div class="cam-frame">
      <div class="cf-corner cf-tl"></div>
      <div class="cf-corner cf-tr"></div>
      <div class="cf-corner cf-bl"></div>
      <div class="cf-corner cf-br"></div>
    </div>

    <!-- HUD -->
    <div class="cam-hud">
      <div class="hud-row hud-top">
        <div class="hud-brand">dxio's electric webs</div>
        <div id="hand-indicator" class="hand-indicator">
          <span class="hi-dot"></span>
          <span id="hand-status-text">SCANNING</span>
        </div>
      </div>
      <div class="hud-row hud-bot">
        <div id="hand-count" class="hand-count">0 HANDS</div>
        <button id="back-btn" class="btn-exit">&#x2190; EXIT</button>
      </div>
    </div>

  </div><!-- /screen-camera -->

  <!-- Flash overlay for transition -->
  <div id="flash" class="flash"></div>

  <!-- MediaPipe CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script src="script.js"></script>
</body>
</html>
